name: Build cookbook

on:
  push:
    branches:
      - main
    paths:
      - "recipes/**"
      - "data/ingredients.yaml"
      - "book/**"
      - "hls/**"
  workflow_dispatch:
    inputs:
      edition:
        description: Cookbook edition to build
        required: false
        default: preview
        type: string
      locale:
        description: Locale to render
        required: false
        default: en
        type: choice
        options:
          - en
          - pt-BR
      release:
        description: Attach the PDF and EPUB to a GitHub Release
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-cookbook:
    name: Build cookbook
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Typst
        uses: typst-community/setup-typst@v3
        with:
          typst-version: "0.12.0"

      - name: Install Pandoc
        uses: r-lib/actions/setup-pandoc@v2
        with:
          pandoc-version: "3.8.3"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Build cookbook assets
        run: >-
          python -m book.build_book
          --edition "${{ inputs.edition || 'preview' }}"
          --locale "${{ inputs.locale || 'en' }}"
          --output dist/

      - name: Upload cookbook artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hls-cookbook-${{ inputs.edition || 'preview' }}-${{ inputs.locale || 'en' }}
          path: |
            dist/*.pdf
            dist/*.epub
          if-no-files-found: error

      - name: Set release tag
        if: inputs.release == true
        id: release-tag
        run: echo "tag=cookbook-${{ inputs.edition }}-$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        if: inputs.release == true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release-tag.outputs.tag }}
          name: HLS Cookbook ${{ inputs.edition }} (${{ inputs.locale }})
          files: |
            dist/*.pdf
            dist/*.epub
