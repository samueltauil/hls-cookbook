name: Build cookbook

on:
  push:
    branches:
      - main
    paths:
      - "recipes/**"
      - "data/ingredients.yaml"
      - "book/**"
      - "hls/**"
  workflow_dispatch:
    inputs:
      edition:
        description: Cookbook edition to build
        required: false
        default: preview
        type: string
      release:
        description: Attach the PDF and EPUB to a tagged GitHub Release
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-cookbook:
    name: Build cookbook
    runs-on: ubuntu-latest
    env:
      EDITION: ${{ inputs.edition || 'preview' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Typst
        uses: typst-community/setup-typst@v3
        with:
          typst-version: "0.12.0"

      - name: Install Pandoc
        uses: r-lib/actions/setup-pandoc@v2
        with:
          pandoc-version: "3.8.3"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Build cookbook (en)
        run: |
          python -m book.build_book --edition "$EDITION" --locale en --output dist/

      - name: Upload cookbook artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hls-cookbook-${{ env.EDITION }}
          path: |
            dist/*.pdf
            dist/*.epub
          if-no-files-found: error

      - name: Publish rolling "latest" release
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.release != true)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: cookbook-latest
          name: HLS Cookbook (latest build)
          body: |
            Automatically rebuilt from `main` after every recipe or book change.
            This release always tracks the latest content on `main` — the tag is
            force-moved on every build, so direct download links stay stable.

            **Downloads:**
            - `hls-cookbook-${{ env.EDITION }}-en.pdf`
            - `hls-cookbook-${{ env.EDITION }}-en.epub`

            Built from commit ${{ github.sha }}.

            > Multi-locale (pt-BR, etc.) is on the roadmap; the i18n
            > scaffolding is in place but only English ships today.
          prerelease: false
          make_latest: "true"
          files: |
            dist/*.pdf
            dist/*.epub

      - name: Set tagged-edition release tag
        if: inputs.release == true
        id: release-tag
        run: echo "tag=cookbook-${EDITION}-$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Publish tagged-edition release
        if: inputs.release == true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release-tag.outputs.tag }}
          name: HLS Cookbook ${{ env.EDITION }} (${{ steps.release-tag.outputs.tag }})
          make_latest: "false"
          files: |
            dist/*.pdf
            dist/*.epub

