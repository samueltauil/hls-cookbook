equipment:
- Heavy-bottomed pot or Dutch oven
- Mixing bowl
- Tongs
tips: Cane vinegar is traditional, but cider or white vinegar works well. Let the
  sauce reduce until it lightly coats a spoon before serving.
storage: Keeps 4 days refrigerated; freezes up to 3 months. Reheat gently with a splash
  of water.
pairings: Serve with steamed jasmine rice and a crisp cucumber or green papaya pickle.
