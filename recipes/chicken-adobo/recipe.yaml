steps:
- order: 1
  text: Combine soy sauce, vinegar, garlic, onion, and brown sugar in a bowl.
- order: 2
  text: Marinate the chicken thighs in the sauce for at least 30 minutes.
- order: 3
  text: Brown chicken in oil, then add the marinade and simmer gently until tender.
- order: 4
  text: Reduce the sauce until glossy and spoon it over the chicken to serve.
