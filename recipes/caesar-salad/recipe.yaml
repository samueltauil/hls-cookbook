tips: Toast the crumbs right before dressing the salad for the best crunch. Use pasteurized
  egg yolk if serving guests who avoid raw egg.
storage: Store dressing and greens separately up to 2 days; toss with crumbs just
  before serving.
pairings: Pair with grilled chicken, tomato soup, or a simple pasta supper.
