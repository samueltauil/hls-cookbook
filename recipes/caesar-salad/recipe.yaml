steps:
- order: 1
  text: Toast bread crumbs in a dry skillet until fragrant and golden.
- order: 2
  text: Whisk lemon juice, Dijon, garlic, egg, and salt, then slowly stream in olive
    oil.
- order: 3
  text: Toss spinach with enough dressing to lightly coat.
- order: 4
  text: Finish with parmesan and toasted crumbs just before serving.
