tips: Use queijo ralado fino para incorporar melhor à massa. Se a massa estiver grudenta,
  unte levemente a colher ou as mãos com óleo.
storage: Melhor servido quente; guarde as sobras na geladeira por até 3 dias ou congele
  porções cruas por até 2 meses.
pairings: Sirva com café forte, goiabada ou acompanhando sopas e ensopados.
