steps:
- order: 1
  text: Aqueça o leite, o óleo e o sal até começar a soltar vapor; despeje sobre o
    polvilho.
- order: 2
  text: Bata até a massa ficar lisa e fria o suficiente para tocar.
- order: 3
  text: Misture os ovos, um de cada vez, e depois incorpore os dois queijos.
- order: 4
  text: Modele porções em uma assadeira forrada e asse até crescerem e ficarem douradas.
