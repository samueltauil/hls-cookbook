steps:
- order: 1
  text: Heat the milk, oil, and salt until steaming, then pour over the tapioca starch.
- order: 2
  text: Beat until the dough is smooth and cool enough to touch.
- order: 3
  text: Mix in eggs one at a time, then fold in both cheeses.
- order: 4
  text: Scoop onto a lined sheet pan and bake until puffed and golden.
