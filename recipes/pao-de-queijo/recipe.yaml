- Saucepan
- Spoon or cookie scoop
- Lined sheet pan
tips: Use finely grated cheese so it melts evenly into the dough. If the dough feels
  sticky, lightly oil the scoop or your hands.
storage: Best warm; refrigerate leftovers up to 3 days or freeze unbaked scoops for
  up to 2 months.
pairings: Serve with strong coffee, guava paste, or alongside soups and stews.
