steps:
- order: 1
  text: Heat the oven to 350°F and line an 8-inch pan with parchment.
- order: 2
  text: Whisk melted butter with both sugars until glossy, then beat in eggs and vanilla.
- order: 3
  text: Fold in cocoa powder, flour, and salt just until no dry streaks remain.
- order: 4
  text: Bake until the edges are set and the center still looks slightly fudgy.
- order: 5
  text: Cool completely before slicing for the cleanest squares.
