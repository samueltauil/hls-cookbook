tips: Pull the pan while the center still looks slightly fudgy; carryover heat finishes
  the bake. Chill before slicing for extra-clean edges.
storage: Keeps airtight at room temperature for 3 days or refrigerated for 1 week;
  freeze slices up to 2 months.
pairings: Serve with cold milk, coffee, or a scoop of vanilla ice cream.
